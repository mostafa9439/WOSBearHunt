<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteout Survival: Bear Hunt Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">
    <h1>🐻 Bear Damage Optimizer</h1>
    <p class="subtitle">Maximize your Rewards!</p>

    <!-- Unified Form Element wraps your calculation tracks entirely -->
    <form id="calcForm" onsubmit="event.preventDefault(); calculateStats();">
        <div class="grid">
            
            <!-- LEFT COLUMN: INPUT MANAGERS -->
            <div>
                <div class="card form-group">
                    <h2>🛡️ Rally Lead Heroes</h2>
                    
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="color:#f59e0b; font-size:13px;">Infantry Hero</label>
                        <select id="infHeroSelect" class="form-group"></select>
                        <div id="infSkillsContainer" class="inline-grid"></div>
                        <div id="infWidgetContainer" style="margin-top: 10px;"></div>
                    </div>

                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="color:#f59e0b; font-size:13px;">Lancer Hero</label>
                        <select id="lanHeroSelect" class="form-group"></select>
                        <div id="lanSkillsContainer" class="inline-grid"></div>
                        <div id="lanWidgetContainer" style="margin-top: 10px;"></div>
                    </div>

                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="color:#f59e0b; font-size:13px;">Marksman Hero</label>
                        <select id="mmHeroSelect" class="form-group"></select>
                        <div id="mmSkillsContainer" class="inline-grid"></div>
                        <div id="mmWidgetContainer" style="margin-top: 10px;"></div>
                    </div>
                </div>

                <div class="card form-group">
                    <h2>🐶 Pet Bonuses</h2>
                    <div class="inline-grid">
                        <div>
                            <label>Troop Attack (%)</label>
                            <input type="number" id="petAtt" value="6">
                        </div>
                        <div>
                            <label>Troop Lethality (%)</label>
                            <input type="number" id="petLeth" value="4">
                        </div>
                    </div>
                </div>

                <div class="card form-group">
                    <h2>🏢 City Bonuses</h2>
                    <div class="inline-grid">
                        <div>
                            <label>Attack (%)</label>
                            <input type="number" id="cityAtt" value="0">
                        </div>
                        <div>
                            <label>Lethality (%)</label>
                            <input type="number" id="cityLeth" value="0">
                        </div>
                    </div>
                </div>

                <div class="card form-group">
                    <h2>🪖 Deployment Capacity </h2>
                    <div>
                        <label>Max Troop Deployment Capacity</label>
                        <input type="number" id="SMax" value="202610">
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: PROFILE STATS, TROOP SELECTIONS, AND OUTPUT PANEL -->
            <div>
                <div class="card form-group">
                    <h2>📊 Base Bonus Stats </h2>
                    <div class="inline-grid form-group">
                        <div>
                            <label style="color:#f59e0b">Troop Att (%)</label>
                            <input type="number" id="bonusTroopAtt" value="289.56">
                        </div>
                        <div>
                            <label style="color:#f59e0b">Troop Leth (%)</label>
                            <input type="number" id="bonusTroopLeth" value="90.2">
                        </div>
                    </div>
                    <div class="inline-grid form-group">
                        <div>
                            <label>Infantry Att (%)</label>
                            <input type="number" id="bonusInfAtt" value="641.84">
                        </div>
                        <div>
                            <label>Infantry Leth (%)</label>
                            <input type="number" id="bonusInfLeth" value="439.06">
                        </div>
                    </div>
                    <div class="inline-grid form-group">
                        <div>
                            <label>Lancer Att (%)</label>
                            <input type="number" id="bonusLanAtt" value="555.54">
                        </div>
                        <div>
                            <label>Lancer Leth (%)</label>
                            <input type="number" id="bonusLanLeth" value="565.2">
                        </div>
                    </div>
                    <div class="inline-grid form-group">
                        <div>
                            <label>Marksman Att (%)</label>
                            <input type="number" id="bonusMmAtt" value="812.78">
                        </div>
                        <div>
                            <label>Marksman Leth (%)</label>
                            <input type="number" id="bonusMmLeth" value="726.4">
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2>⚔️ Base Troop Setup</h2>
                    
                    <!-- Headers row -->
                    <div class="table-grid" style="margin-bottom: 5px;">
                        <div></div>
                        <span style="font-size:11px; color:#9ca3af; font-weight:bold; text-transform:uppercase;">Level</span>
                        <span style="font-size:11px; color:#9ca3af; font-weight:bold; text-transform:uppercase;">Fire Crystal</span>
                    </div>

                    <!-- Infantry Row: 3 distinct elements -->
                    <div class="table-grid form-group">
                        <label>Infantry</label>
                        <select id="lvl-infantry"></select>
                        <select id="fc-infantry"></select>
                    </div>

                    <!-- Lancer Row -->
                    <div class="table-grid form-group">
                        <label>Lancer</label>
                        <select id="lvl-lancer"></select>
                        <select id="fc-lancer"></select>
                    </div>

                    <!-- Marksman Row -->
                    <div class="table-grid form-group">
                        <label>Marksman</label>
                        <select id="lvl-marksman"></select>
                        <select id="fc-marksman"></select>
                    </div>
                </div>

                <button type="submit" style="margin-bottom: 20px; width: 100%;">Calculate</button>

                <div id="resultsSection" class="results-box hidden">
                    <h2>📊 Results </h2>
                    <table class="stat-table">
                        <thead>
                            <tr>
                               <th>Troop Type</th>
                               <th style="text-align:center">Battle Report Numbers</th>
                               <th style="text-align:center">Optimal Troop Count</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>🛡️ Infantry</td>
                                <td id="resInfMod" style="text-align:center; color:#9ca3af;">-</td>
                                <td id="opInf" style="text-align:center; font-weight:bold; color:#10b981;">-</td>
                            </tr>
                            <tr>
                                <td>🐎 Lancer</td>
                                <td id="resLanMod" style="text-align:center; color:#9ca3af;">-</td>
                                <td id="opLan" style="text-align:center; font-weight:bold; color:#10b981;">-</td>
                            </tr>
                            <tr>
                                <td>🏹 Marksman</td>
                                <td id="resMmMod" style="text-align:center; color:#9ca3af;">-</td>
                                <td id="opMm" style="text-align:center; font-weight:bold; color:#10b981;">-</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div> <!-- End Right Column -->

        </div> <!-- End Grid Wrapper -->
    </form>
</div>

    <script src="app.js"></script>
</body>
</html>
